backend:
  name: git-gateway
  branch: main               # ⚠️ confirmá en GitHub si es "main" o "master"

media_folder: "images/obras" # ahí se guardan los archivos de imagen subidos
public_folder: "/images/obras"

collections:
  - name: "obras"
    label: "Galería de Obras"
    files:
      - name: "galeria"
        label: "Fotos del Carrusel"
        file: "data/obras.json"
        fields:
          - name: "fotos"
            label: "Fotos"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.alt}}"
            fields:
              - { name: "imagen", label: "Imagen", widget: "image" }
              - { name: "alt", label: "Descripción breve (accesibilidad)", widget: "string", required: false, default: "Obra realizada" }
